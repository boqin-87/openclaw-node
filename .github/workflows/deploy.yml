name: Deploy Astro Blog

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmmirror.com'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build
        env:
          npm_config_registry: https://registry.npmmirror.com

      - name: Deploy to VM via Webhook
        run: |
          curl -s -X POST \
            --max-time 30 \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\",\"repo\":\"${{ github.repository }}\"}" \
            "https://webhook.6661993.xyz/webhook/deploy"
          
          # Fallback: show deployment instructions if webhook fails
          echo "---"
          echo "如果上方请求超时，说明 GitHub Actions 无法直接访问内网。"
          echo "请确保 VM 可以通过以下方式之一被触发："
          echo "1. Cloudflare Tunnel 暴露 20080 端口到公网"
          echo "2. 使用 Tailscale VPN"
          echo "3. 在 VM 上设置 cron 定时拉取"
